<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm Sinh viên</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; max-width: 600px; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ddd; border-radius: 4px; }
        button { margin-top: 20px; padding: 10px 30px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #45a049; }
        a { display: inline-block; margin-top: 15px; color: #666; }
    </style>
</head>
<body>
<h1>Thêm Sinh viên mới</h1>

<form th:action="${student.id != null}
            ? '/students/edit/' + ${student.id}
            : '/students/add'"
      th:object="${student}" method="post">

    <label>Họ tên:</label>
    <input type="text" th:field="*{name}" placeholder="Nguyễn Văn A" required>

    <label>Email:</label>
    <input type="email" th:field="*{email}" placeholder="abc@fpt.edu.vn" required>

    <label>Ngày sinh:</label>
    <input type="date" name="dob" th:value="${student.dob != null} ? ${#temporals.format(student.dob, 'yyyy-MM-dd')} : ''">

    <label>Ngành học:</label>
    <select th:field="*{major}">
        <option value="">-- Chọn ngành --</option>
        <option value="Software Engineering">Software Engineering</option>
        <option value="Information Assurance">Information Assurance</option>
        <option value="Artificial Intelligence">Artificial Intelligence</option>
        <option value="Digital Art Design">Digital Art Design</option>
    </select>

    <label>GPA:</label>
    <input type="number" th:field="*{gpa}" step="0.01" min="0" max="4" placeholder="3.50">

    <button type="submit">Lưu</button>
</form>

<a th:href="@{/students}">&larr; Quay về danh sách</a>
</body>
</html>
